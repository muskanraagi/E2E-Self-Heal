name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with ruff"
          file_pattern: "*.py"

      - name: Typecheck
        run: uv run pyright

      - name: Test with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  examples-repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/package-lock.json

      - name: Install Playwright demo deps
        working-directory: examples
        run: npm ci

      - name: Install Chromium
        working-directory: examples
        run: npx playwright install chromium

      - name: Verify demo fails on outdated selector
        working-directory: examples
        run: |
          set +e
          npx playwright test example.spec.ts
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "Expected example.spec.ts to fail on #submit-btn"
            exit 1
          fi
          echo "Demo correctly reproduces the broken-selector failure"

  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has-key: ${{ steps.check.outputs.has-key }}
    steps:
      - id: check
        env:
          E2E_HEALER_NVIDIA_API_KEY: ${{ secrets.E2E_HEALER_NVIDIA_API_KEY }}
        run: |
          if [ -n "$E2E_HEALER_NVIDIA_API_KEY" ]; then
            echo "has-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-key=false" >> "$GITHUB_OUTPUT"
          fi

  examples-heal:
    runs-on: ubuntu-latest
    needs: [check, examples-repro, check-secret]
    if: needs.check-secret.outputs.has-key == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/package-lock.json

      - name: Install Playwright demo deps
        working-directory: examples
        run: npm ci

      - name: Install Chromium
        working-directory: examples
        run: npx playwright install chromium

      - name: Capture failing Playwright log
        working-directory: examples
        run: |
          set +e
          npx playwright test example.spec.ts 2>&1 | tee playwright.log
          set -e

      - name: Dry-run heal against demo
        working-directory: examples
        env:
          E2E_HEALER_NVIDIA_API_KEY: ${{ secrets.E2E_HEALER_NVIDIA_API_KEY }}
        run: uv run e2e-healer example.spec.ts --log playwright.log --diff selector-rename.diff --dry-run
