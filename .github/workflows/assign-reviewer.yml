name: assign-reviewer

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    # Skip drafts and PRs opened by the maintainer (you can't review your own PR).
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'Lee-Dongwook'
    steps:
      - name: Request review from maintainer
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['Lee-Dongwook'],
            });
            core.info('Requested review from Lee-Dongwook');
